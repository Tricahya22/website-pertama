<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Online Saya</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f9; }
        h1 { text-align: center; color: #333; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; max-width: 1000px; margin: 0 auto; }
        .product-card { background-color: #fff; border-radius: 8px; padding: 15px; width: 250px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; margin-bottom: 10px; }
        .product-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .product-price { color: #e74c3c; font-size: 16px; font-weight: bold; margin-bottom: 15px; }
        .btn-wa { display: inline-block; background-color: #25d366; color: #fff; padding: 10px 15px; border-radius: 5px; text-decoration: none; font-weight: bold; }
        .btn-wa:hover { background-color: #128c7e; }
    </style>
</head>
<body>

    <h1>Katalog Produk Kami</h1>

    <div class="container">
        <!-- Produk 1 -->
        <div class="product-card">
            <img src="https://placeholder.com" alt="Sepatu Sneakers">
            <div class="product-title">Sepatu Sneakers</div>
            <div class="product-price">Rp 250.000</div>
            <a href="https://wa.me" class="btn-wa" target="_blank">Beli via WhatsApp</a>
        </div>

        <!-- Produk 2 -->
        <div class="product-card">
            <img src="https://placeholder.com" alt="Kaos Polos Premium">
            <div class="product-title">Kaos Polos Premium</div>
            <div class="product-price">Rp 80.000</div>
            <a href="https://wa.me" class="btn-wa" target="_blank">Beli via WhatsApp</a>
        </div>

        <!-- Produk 3 -->
        <div class="product-card">
            <img src="https://placeholder.com" alt="Tas Ransel Kasual">
            <div class="product-title">Tas Ransel Kasual</div>
            <div class="product-price">Rp 175.000</div>
            <a href="https://wa.me" class="btn-wa" target="_blank">Beli via WhatsApp</a>
        </div>
    </div>

</body>
</html>
